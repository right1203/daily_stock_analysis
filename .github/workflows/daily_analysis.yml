name: 매일 주식 분석

on:
  # 정기 실행 - 매일 한국 표준시 18:00 (UTC 09:00)
  schedule:
    - cron: '0 9 * * 1-5'     # 월요일~금요일, UTC 09:00 = KST 18:00

  # 수동 실행
  workflow_dispatch:
    inputs:
      mode:
        description: '실행 모드'
        required: true
        default: 'full'
        type: choice
        options:
          - full          # 전체 분석（종목+시장）
          - market-only   # 시장 복기만
          - stocks-only   # 종목 분석만
      force_run:
        description: '강제 실행（거래일 확인 건너뜀）'
        required: false
        default: false
        type: boolean

# 동시성 제어: 동시에 하나의 분석 작업만 실행
concurrency:
  group: stock-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    # 작업 중단 방지를 위한 타임아웃 제한 추가
    timeout-minutes: 30

    steps:
      - name: 무작위 지연（고정 시간 접근 방지）
        run: sleep $((RANDOM % 60))  # 0-60초 무작위 지연 후 시작

      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 환경 설정
        uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: uv sync

      - name: 필수 디렉토리 생성
        run: |
          mkdir -p data logs reports

      - name: 주식 분석 실행
        env:
          # ==========================================
          # AI 설정
          # ==========================================
          # Gemini AI（주 선택）
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || secrets.GEMINI_MODEL || 'gemini-3-flash-preview' }}
          GEMINI_MODEL_FALLBACK: ${{ vars.GEMINI_MODEL_FALLBACK || secrets.GEMINI_MODEL_FALLBACK || 'gemini-2.5-flash' }}
          GEMINI_REQUEST_DELAY: '3.0'

          # AIHubMix（OPENAI_API_KEY보다 우선, base_url 자동 적용, 국내 사용자 권장）
          AIHUBMIX_KEY: ${{ secrets.AIHUBMIX_KEY }}

          # OpenAI 호환 API（대체）
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || secrets.OPENAI_MODEL }}

          # Anthropic / Claude
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || secrets.ANTHROPIC_MODEL || 'claude-3-5-sonnet-20241022' }}

          # ==========================================
          # 데이터 소스
          # ==========================================
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}

          # ==========================================
          # 검색 서비스
          # ==========================================
          BOCHA_API_KEYS: ${{ secrets.BOCHA_API_KEYS }}
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
          SERPAPI_API_KEYS: ${{ secrets.SERPAPI_API_KEYS }}

          # ==========================================
          # 알림 채널（여러 개 동시 설정 가능, 전체 발송）
          # ==========================================

          # 방법 1: 기업 WeChat Webhook
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          WECHAT_MSG_TYPE: ${{ vars.WECHAT_MSG_TYPE || secrets.WECHAT_MSG_TYPE || 'markdown' }}

          # 방법 2: Feishu Webhook
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}

          # 방법 3: Telegram
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_MESSAGE_THREAD_ID: ${{ secrets.TELEGRAM_MESSAGE_THREAD_ID }}

          # 방법 4: 이메일
          EMAIL_SENDER: ${{ vars.EMAIL_SENDER || secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVERS: ${{ vars.EMAIL_RECEIVERS || secrets.EMAIL_RECEIVERS }}
          EMAIL_SENDER_NAME: ${{ vars.EMAIL_SENDER_NAME || secrets.EMAIL_SENDER_NAME || 'daily_stock_analysis주식분석도우미' }}

          # 방법 5: Pushover
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_API_TOKEN: ${{ secrets.PUSHOVER_API_TOKEN }}

          # 방법 6: PushPlus ⬅️ 신규 추가!
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}

          # 방법 7: 커스텀 Webhook（DingTalk, Bark, 자체 서비스 등）
          CUSTOM_WEBHOOK_URLS: ${{ secrets.CUSTOM_WEBHOOK_URLS }}
          CUSTOM_WEBHOOK_BEARER_TOKEN: ${{ secrets.CUSTOM_WEBHOOK_BEARER_TOKEN }}

          # 방법 8: Discord
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_MAIN_CHANNEL_ID: ${{ secrets.DISCORD_MAIN_CHANNEL_ID }}

          # 방법 9: Feishu 클라우드 문서
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_FOLDER_TOKEN: ${{ secrets.FEISHU_FOLDER_TOKEN }}

          # 방법 10: AstrBot
          ASTRBOT_URL: ${{ secrets.ASTRBOT_URL }}
          ASTRBOT_TOKEN: ${{ secrets.ASTRBOT_TOKEN }}

          # 방법 11: Server酱3
          SERVERCHAN3_SENDKEY: ${{ secrets.SERVERCHAN3_SENDKEY }}

          # ==========================================
          # 관심 종목 설정
          # ==========================================
          STOCK_LIST: ${{ vars.STOCK_LIST || secrets.STOCK_LIST || '005930' }}
          MARKET_REVIEW_REGION: ${{ vars.MARKET_REVIEW_REGION || secrets.MARKET_REVIEW_REGION || 'kr' }}

          # ==========================================
          # 실행 설정 ⬅️ 신규 추가!
          # ==========================================
          REPORT_TYPE: ${{ vars.REPORT_TYPE || secrets.REPORT_TYPE || 'simple' }}
          SINGLE_STOCK_NOTIFY: ${{ vars.SINGLE_STOCK_NOTIFY || secrets.SINGLE_STOCK_NOTIFY || 'false' }}
          MARKET_REVIEW_ENABLED: ${{ vars.MARKET_REVIEW_ENABLED || secrets.MARKET_REVIEW_ENABLED || 'true' }}
          ANALYSIS_DELAY: ${{ vars.ANALYSIS_DELAY || secrets.ANALYSIS_DELAY || '0' }}
          TRADING_DAY_CHECK_ENABLED: ${{ vars.TRADING_DAY_CHECK_ENABLED || secrets.TRADING_DAY_CHECK_ENABLED || 'true' }}

          # ==========================================
          # 시스템 설정
          # ==========================================
          LOG_LEVEL: INFO
          MAX_WORKERS: ${{ vars.MAX_WORKERS || secrets.MAX_WORKERS || '1' }}
          # GitHub Actions 환경에서는 불안정한 데이터 소스를 비활성화하는 것을 권장
          ENABLE_CHIP_DISTRIBUTION: 'false'
          # 실시간 시세 데이터 소스 우선순위（Tencent은 거래량 비율이 있고 안정적이어서 첫 번째 권장）
          # 선택 가능 값: tencent, akshare_sina, efinance, akshare_em, tushare
          # Tushare Pro 고적점 계정이 있다면 tushare를 첫 번째로 설정 가능
          REALTIME_SOURCE_PRIORITY: ${{ vars.REALTIME_SOURCE_PRIORITY || 'tencent,akshare_sina,efinance,akshare_em' }}

        run: |
          # 실행 모드 판별
          MODE="${{ github.event.inputs.mode || 'full' }}"

          echo "=========================================="
          echo "🚀 A주 관심 종목 지능형 분석 시스템"
          echo "=========================================="
          echo "⏰ 시간: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          echo "🎯 실행 모드: $MODE"
          echo "📊 관심 종목: $STOCK_LIST"
          echo "📝 리포트 유형: $REPORT_TYPE"
          echo ""
          echo "=========================================="
          echo "📋 설정 확인"
          echo "=========================================="
          echo "【AI 설정】"
          echo "  Gemini API Key: $([ -n "$GEMINI_API_KEY" ] && echo '✅ 설정됨' || echo '❌ 미설정')"
          echo "  AIHubMix Key:   $([ -n "$AIHUBMIX_KEY" ] && echo '✅ 설정됨' || echo '⚪ 미설정')"
          echo "  OpenAI API Key: $([ -n "$OPENAI_API_KEY" ] && echo '✅ 설정됨' || echo '⚪ 미설정')"
          echo "  Anthropic Key:  $([ -n "$ANTHROPIC_API_KEY" ] && echo '✅ 설정됨' || echo '⚪ 미설정')"
          echo ""
          echo "【검색 엔진】"
          echo "  Bocha API Keys: $([ -n "$BOCHA_API_KEYS" ] && echo '✅ 설정됨' || echo '⚪ 미설정')"
          echo "  Tavily API Keys: $([ -n "$TAVILY_API_KEYS" ] && echo '✅ 설정됨' || echo '⚪ 미설정')"
          echo ""
          echo "【알림 채널】"
          echo "  PushPlus: $([ -n "$PUSHPLUS_TOKEN" ] && echo '✅ 설정됨' || echo '⚪ 미설정')"
          echo "  기업 WeChat: $([ -n "$WECHAT_WEBHOOK_URL" ] && echo '✅ 설정됨' || echo '⚪ 미설정')"
          echo "  Feishu: $([ -n "$FEISHU_WEBHOOK_URL" ] && echo '✅ 설정됨' || echo '⚪ 미설정')"
          echo "  Telegram: $([ -n "$TELEGRAM_BOT_TOKEN" ] && echo '✅ 설정됨' || echo '⚪ 미설정')"
          echo "  Discord: $([ -n "$DISCORD_WEBHOOK_URL" ] && echo '✅ 설정됨' || echo '⚪ 미설정')"
          echo "  AstrBot: $([ -n "$ASTRBOT_URL" ] && echo '✅ 설정됨' || echo '⚪ 미설정')"
          echo "=========================================="
          echo ""

          # 커맨드라인 인수 구성
          FORCE_RUN_ARG=""
          if [ "${{ github.event.inputs.force_run }}" = "true" ]; then
            FORCE_RUN_ARG="--force-run"
            echo "⚡ 강제 실행 모드 활성화（거래일 확인 건너뜀）"
          fi

          # 분석 실행
          if [ "$MODE" = "market-only" ]; then
            uv run python main.py --market-review $FORCE_RUN_ARG
          elif [ "$MODE" = "stocks-only" ]; then
            uv run python main.py --no-market-review $FORCE_RUN_ARG
          else
            uv run python main.py $FORCE_RUN_ARG
          fi

      - name: 분석 리포트 업로드
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: analysis-reports-${{ github.run_number }}
          path: |
            reports/
            logs/
          retention-days: 30

      - name: 실행 결과 표시
        if: always()
        run: |
          echo ""
          echo "=========================================="
          echo "📊 분석 완료"
          echo "=========================================="
          if [ -d "reports" ] && [ "$(ls -A reports 2>/dev/null)" ]; then
            echo "생성된 리포트:"
            ls -la reports/
          else
            echo "⚠️ 리포트 파일이 생성되지 않았습니다"
          fi
          echo ""
          if [ -f "logs/stock_analysis_$(date +%Y%m%d).log" ]; then
            echo "📜 최근 로그（마지막 30줄）:"
            tail -30 logs/stock_analysis_*.log 2>/dev/null || echo "로그 없음"
          fi
