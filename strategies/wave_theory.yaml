instructions: |
  **파동이론（Elliott Wave Theory）**

  핵심 원칙：시장은 5파 추진 + 3파 조정의 순환 구조로 움직입니다.

  ## 분석 단계

  ### 1. 현재 파동 식별
  `get_daily_history`를 사용하여 최근 120일 데이터를 가져오고 `analyze_trend` 추세 데이터를 결합합니다：

  **추진파（1-3-5）식별 특성**：
  - 1파：추세 반전의 첫 번째 파동, 거래량 온화하게 증가.
  - 3파：가장 강력한 추진파, 일반적으로 거래량 증가, MACD 강세. 절대 가장 짧은 파동이 되지 않습니다.
  - 5파：거래량이 3파보다 약한 경우가 많으며, 정상 배치가 나타나면 고점 이후 곧 종료됩니다.

  **조정파（A-B-C）식별 특성**：
  - A파：첫 번째 하락, 거래량 상대적으로 많고, 대부분 조정으로 생각합니다.
  - B파：반등, 강도가 이전 상승폭보다 약하고, 거래량 감소, 함정 위험 높음.
  - C파：두 번째 하락, 강도가 A파를 초과하는 경우가 많으며, 조정을 완성합니다.

  ### 2. 피보나치 위치 판단
  - 2파 조정은 일반적으로 1파의 38.2%~61.8%.
  - 3파 목표는 일반적으로 1파의 1.618~2.618배 연장.
  - 4파는 1파 가격 영역으로 진입할 수 없습니다（파동 규칙 위반）.
  - C파 목표：A파 정점에서 계산, A파 길이와 같거나 초과합니다.

  ### 3. 최적 매수 시점
  - **2파 조정 안정**（황금 골짜기）：가장 안전한 매수 시점, 손절은 1파 시작점.
  - **4파 조정 안정**：차선, 손절은 1파 정점.
  - **3파 초기 돌파**：거래량 증가로 1파 고점 돌파 시.
  - 5파 말단에서의 고점 추격 금지（정상 배치 위험）.

  ### 4. 리스크 경고
  - B파 반등은 비중 높은 포지션 비권장（함정 성질）.
  - 파동 카운팅에는 주관성이 있으며, 다른 기술 지표와 결합하여 검증이 필요합니다.
  - 파동 규칙이 위반된 경우（예：4파가 1파를 침범）, 카운팅을 재시작해야 합니다.

  ### 5. 출력 요구사항
  - 현재 가능한 파동 위치를 제시합니다（예："3파 중간 구간"또는 "4파 조정 의심"）.
  - 핵심 피보나치 지지/저항 수준（0.382/0.618/1.618）을 제시합니다.
  - 현재 매수 시점인지, 기다릴 것인지, 회피할 것인지 설명합니다.
  - 파동 카운팅 신뢰도 표시（높음/중간/낮음）.

  점수 조정 제안：
  - 2파 바닥 안정（황금 골짜기）：`sentiment_score +15`
  - 3파 돌파 확인：`sentiment_score +12`
  - 5파 말단/정상 배치：`sentiment_score -10`
  - C파 하락 중：`sentiment_score -12`
