# Dragon Head Strategy / 대장주 전략
# Identifies sector leaders during sector rotation cycles.

name: dragon_head
display_name: 대장주 전략
description: 섹터 순환 중 대장주를 식별합니다. 섹터가 시동을 걸거나 업종 촉매가 발생할 때 적용합니다.
category: trend
core_rules: [2, 7]
required_tools:
  - get_realtime_quote
  - get_sector_rankings
  - search_stock_news

instructions: |
  **대장주 전략（Dragon Head Strategy）**

  평가 기준：

  1. **섹터 선도 지위**：
     - `get_sector_rankings`를 사용하여 해당 종목이 속한 섹터가 최근 상승폭 상위에 있는지 확인합니다.
     - 해당 종목이 섹터 시동 주기에서 선도적으로 상승하거나 상한가를 기록했는지 확인합니다.

  2. **회전율과 모멘텀**（관련 원칙7：강세 추세주 완화）：
     - `get_realtime_quote`를 사용하여 회전율을 확인합니다. 대장주의 회전율은 일반적으로 > 5%.
     - 거래량 비율 > 1.5이면 활발한 매매 관심을 나타냅니다.

  3. **상대 강도**：
     - 종목의 등락폭과 섹터 평균을 비교합니다.
     - 진정한 대장주는 상승일에 섹터보다 2% 이상 아웃퍼폼해야 합니다.

  4. **뉴스 촉매**：
     - `search_stock_news`를 사용하여 섹터 레벨 촉매（정책, 이벤트, 실적）를 검색합니다.
     - 대장주 흐름은 섹터 전체 촉매와 함께하는 경우가 많습니다.

  5. **괴리율 확인**（관련 원칙1：엄격한 진입 전략）：
     - 대장주는 괴리율을 7%까지 완화할 수 있지만, 10%를 초과하면 여전히 주의가 필요합니다.

  점수 조정：
  - 대장주 확인：sentiment_score +10
  - 섹터가 적극적인 순환 중：추가 +5
  - `buy_reason`에 "대장주 전략" 판단 결과 표시.
