# Default Bull Trend Strategy / 기본 상승 추세

name: bull_trend
display_name: 기본 상승 추세
description: 개별 종목 분석의 기본 전략으로, 상승 배열·추세 지속·눌림목 저가 매수 기회를 식별합니다.
category: trend
core_rules: [1, 2, 3]
required_tools:
  - get_daily_history
  - analyze_trend

instructions: |
  **기본 상승 추세（Default Bull Trend Strategy）**

  적용 상황：
  - 일반 개별 종목 분석의 기본 전략.
  - "추세 상승 + 리스크 통제 + 고점 추격 금지" 기회를 우선적으로 탐색.

  분석 프레임워크：

  1. **추세 확인（최우선 순위）**
     - `analyze_trend`를 사용하여 MA5/MA10/MA20 배열을 판단합니다.
     - MA5 >= MA10 >= MA20이고 MA20 기울기가 위를 향하면 상승 구조로 판단합니다.
     - 가격이 MA20을 유의미하게 하향 이탈하면 상승 가중치를 낮춥니다.

  2. **위치와 리듬**
     - "눌림목 불이탈"을 "고점 추격"보다 우선합니다.
     - 가격이 MA5/MA10에서 너무 멀어지면 눌림목을 기다릴 것을 권장합니다.
     - 거래량 증가로 유효 저항선 돌파 시 승률 등급을 높일 수 있습니다.

  3. **거래량-가격 검증**
     - `get_daily_history`를 사용하여 돌파일/반등일에 거래량이 증가했는지 확인합니다.
     - 거래량 감소 상승은 주의가 필요하고, 거래량 증가 상승 정체는 매도 분기 경고입니다.

  4. **매매 제안 출력**
     - "매수/관망/감소" 방향과 트리거 조건을 명확하게 출력합니다.
     - 반드시 손절 기준을 제시합니다（예：MA20 하방 또는 구조적 저점）.
     - 명확한 우위가 없으면 "현재 진입 않음"이라고 명시하여 과잉 매매를 방지합니다.

  점수 조정 제안：
  - 상승 배열 + 추세 강도 양호：`sentiment_score +12`
  - 핵심 이동평균 눌림목 후 안정：`sentiment_score +8`
  - 거래량 증가로 핵심 저항선 돌파：`sentiment_score +10`
  - MA20 하향 이탈 또는 추세 약화：`sentiment_score -12`
