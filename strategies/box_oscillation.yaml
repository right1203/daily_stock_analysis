instructions: |
  **박스권 횡보 전략（Box Range Trading Strategy）**

  핵심 논리：박스권 내 가격은 저항선과 지지선 사이에서 반복적으로 횡보합니다.
  "지지선에 붙어서 매수하고, 저항선에 가까워지면 매도"하여 구간 수익을 얻습니다.

  ## 분석 단계

  ### 1. 박스권 식별
  `get_daily_history`를 사용하여 최근 60~120일 데이터를 가져옵니다：

  - **박스권 상단（저항선）**：최근 여러 번 접촉했지만 유효하게 돌파하지 못한 고점 연결선.
    일반적으로 20~60일 내 3회 이상의 고점 집중 구역입니다.
  - **박스권 하단（지지선）**：최근 여러 번 하락했지만 유효하게 하향 이탈하지 못한 저점 연결선.
  - 박스권 유효성：상단과 하단 각각 최소 2~3회 이상 접촉해야 확인됩니다.
  - `analyze_trend`의 support_levels / resistance_levels를 보조적으로 활용합니다.

  ### 2. 현재 위치 판단
  `get_realtime_quote`를 사용하여 현재가와 박스권 경계를 비교합니다：

  - **박스권 하단 영역**（지지선까지 ≤5%）：매수/증가 신호, 손절은 박스권 하단 아래 3%.
  - **박스권 중간 영역**（박스권 중간 1/3）：관망, 적극적인 매매 없음.
  - **박스권 상단 영역**（저항선까지 ≤5%）：감소/이익 실현 신호, 고점 추격 불필요.

  ### 3. 거래량 보조 판단
  - **박스권 하단 거래량 증가 안정**：지지가 유효한 강한 신호, 비중을 높일 수 있습니다.
  - **박스권 상단 거래량 감소 상승 정체**：저항이 유효한 매도 신호.
  - **박스권 돌파（거래량이 평균의 2배 이상）**：
    - 상향 유효 돌파 → 상승 추세 전략으로 전환, 새 목표 = 박스권 높이만큼 연장.
    - 하향 유효 이탈 → 이탈 후 대기, 기존 지지가 저항으로 전환.

  ### 4. 박스권 폭과 기대 수익
  - 박스권 폭 계산：(상단 - 하단) / 하단 × 100%.
  - 폭 < 5%：운영 공간이 너무 좁아 참여 비권장.
  - 폭 5%~15%：표준 박스권, 스윙 매매 가능.
  - 폭 > 15%：대형 박스권, 더 큰 스윙 가능.

  ### 5. 가짜 돌파 식별
  - 장중에 저항선/지지선에 닿은 후 빠르게 회귀, 종가가 박스권 내로 복귀 → 가짜 돌파, 박스권 매매 유지.
  - 연속 이틀 종가가 박스권 경계를 돌파하고 거래량 증가 → 진짜 돌파, 전략 수정.

  ### 6. 출력 요구사항
  - 박스권 상단가와 하단가를 명확히 제시합니다.
  - 현재 가격이 있는 구간（박스권 하단/중간/상단）.
  - 가격이 이미 돌파한 경우, 돌파 방향과 새 목표를 설명합니다.
  - 권장 포지션 크기와 손절가.

  점수 조정 제안：
  - 박스권 하단 안정 + 거래량 감소：`sentiment_score +10`
  - 박스권 하단 거래량 증가 상단 공략：`sentiment_score +12`
  - 박스권 상향 유효 돌파：`sentiment_score +15, 추세 전략으로 전환`
  - 박스권 상단 영역에 위치：`sentiment_score -5（고점 추격 금지）`
  - 박스권 하단 유효 이탈：`sentiment_score -15, 이탈`
