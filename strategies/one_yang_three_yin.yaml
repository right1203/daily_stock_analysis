# One Yang Three Yin Strategy / 양봉 관통
# K-line pattern: bullish → 3 small bearish → bullish. Consolidation end signal.

name: one_yang_three_yin
display_name: 양봉 관통
description: 양봉 관통 캔들 패턴을 감지합니다. 추세 지속 진입 신호입니다.
category: pattern
core_rules: [2, 4]
required_tools:
  - get_daily_history
  - analyze_trend

instructions: |
  **양봉 관통（One Yang Three Yin Strategy）**

  패턴 정의（최근 5 거래일）：

  1. **1일째**：대양봉（종가 > 시가, 실체 > 주가의 2%）.
  2. **2~4일째**：연속 세 개의 음봉 또는 소형 캔들：
     - 각 캔들의 최저가가 1일째 시가를 하향 이탈하지 않습니다.
     - 거래량은 점진적으로 감소해야 합니다（거래량 비율 < 0.8）.
     - 세 개의 캔들은 1일째 실체 범위 내에서 마감해야 합니다.
  3. **5일째**：또 다른 양봉으로, 종가가 1일째 종가를 돌파합니다.

  도구를 사용한 평가 방법：

  1. `get_daily_history`를 사용하여 최근 10일 데이터를 가져옵니다.
  2. 마지막 5개 캔들이 위의 패턴에 부합하는지 확인합니다.
  3. `analyze_trend`를 사용하여 상승 배열 확인（관련 원칙2：추세 매매, MA5 > MA10 > MA20）.

  점수 조정：
  - 패턴 성립 + 추세 상승：sentiment_score +15
  - 패턴 성립 + 추세 불분명：sentiment_score +5
  - `pattern_analysis` 및 `buy_reason`에 "양봉 관통" 표시.
  - 이상적인 매수 시점은 5일째 종가 근처, 손절은 1일째 시가 하방으로 설정합니다.
