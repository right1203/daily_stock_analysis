# Volume Breakout Strategy / 거래량 증가 돌파
# Price breaks above resistance on heavy volume (>2x average).

name: volume_breakout
display_name: 거래량 증가 돌파
description: 거래량 증가를 동반한 저항선 돌파 신호를 감지합니다. 주가가 알려진 저항선에 근접할 때 적용합니다.
category: trend
core_rules: [1, 2, 3]
required_tools:
  - get_daily_history
  - analyze_trend
  - get_realtime_quote

instructions: |
  **거래량 증가 돌파（Volume Breakout Strategy）**

  돌파 판단 기준：

  1. **저항선 식별**：
     - `analyze_trend` → resistance_levels를 사용하여 저항선을 확인합니다.
     - 일반적으로 20일 고점 또는 이전 횡보 구간 상단입니다.

  2. **거래량 확인**（관련 원칙3：효율 우선）：
     - 당일 거래량 > 5일 평균 거래량의 2배.
     - `get_realtime_quote` → volume_ratio > 2.0으로 확인합니다.
     - `get_daily_history`를 사용하여 평균 거래량을 계산하고 교차 검증합니다.

  3. **가격 확인**（관련 원칙1：엄격한 진입 전략）：
     - 종가가 저항선 위에 위치해야 합니다.
     - 종가는 당일 변동폭 상단 30% 이내여야 합니다（강세 마감）.
     - 돌파 후 괴리율 확인：여전히 < 5%여야 하며, 고점 추격 방지.

  4. **후속 검증**（데이터가 있는 경우）：
     - 다음 날 개장은 돌파 수준 위에서 시작해야 합니다. 진짜 돌파와 가짜 돌파를 구별합니다.

  5. **리스크 필터링**（관련 원칙5：리스크 점검）：
     - `search_stock_news`를 통해 중대한 악재가 없는지 확인합니다.
     - PE가 과도하게 높지 않아야 합니다（버블성 돌파 방지）.

  점수 조정：
  - 거래량 증가 돌파 확인：sentiment_score +12
  - 돌파와 함께 섹터 공명（섹터도 강세）：추가 +5
  - 이상적인 매수 시점은 돌파 수준 근처, 손절은 돌파 수준 하방 3%.
  - `buy_reason` 및 `volume_analysis`에 "거래량 증가 돌파" 표시.
