# Sentiment Cycle Strategy / 심리 사이클
# Uses market sentiment, turnover rate and volume pattern to time entries against crowd behavior.

name: emotion_cycle
display_name: 심리 사이클
description: 시장 심리, 회전율, 거래량-가격 구조를 기반으로 심리 저점（공황 바닥）과 심리 고점（광기 정점）을 식별하여 역심리 포지션을 잡습니다.
category: framework
core_rules: [1, 2, 3, 5]
required_tools:
  - get_daily_history
  - get_realtime_quote
  - analyze_trend
  - search_stock_news

instructions: |
  **심리 사이클 전략（Sentiment Cycle Strategy）**

  핵심 철학：시장 참여자의 심리는 "공황→비관→의심→희망→낙관→흥분→탐욕→광기" 사이에서
  순환합니다. 스마트 머니는 공황 바닥에서 포지션을 잡고, 광기 정점에서 이탈합니다.

  ## 심리 단계 정량화 지표

  ### 1단계：회전율 분석（심리 열도 핵심 지표）
  `get_daily_history`와 `get_realtime_quote`를 사용합니다：

  - **회전율 < 0.5%/일**：시장 냉담, 무관심, 잠재적 바닥 영역（탐욕스럽게 남의 공황을 매수）.
  - **회전율 0.5%~2%**：정상 거래, 심리 안정.
  - **회전율 2%~5%**：활발, 시장이 주목하기 시작, 고점 추격 부적절.
  - **회전율 > 5%**：높은 열도, 단기 자금/개인투자자 유입, 심리 정점 경계.
  - **회전율 > 10%（일평균）**：극도로 과열, 일반적으로 단기 정점.

  ### 2단계：연속 회전율 추이
  `get_daily_history`를 사용하여 최근 20일 회전율 추이를 계산합니다：
  - 높은 데서 낮은 쪽으로（지속적 냉각）+ 거래량 감소 → 심리 퇴조, 인내심을 갖고 대기합니다.
  - 낮은 데서 높은 쪽으로（가속 승온）+ 거래량 급증 → 심리 시동, 진입 가능합니다.
  - 갑작스러운 단일일 폭발적 거래량（회전율이 이전의 5배 초과）→ 주력 세력 출분인 경우가 많으니 주의가 필요합니다.

  ### 3단계：뉴스 심리 분석
  `search_stock_news`를 사용하여 최근 뉴스를 검색하고 심리 성향을 분석합니다：
  - "호재 실현, 실적 초과, 상한가, 기관 추천" 등의 뉴스가 집중 → 심리가 과열될 수 있습니다.
  - "실적 하락, 악재, 지지선 이탈" 등의 뉴스가 집중 → 비관적 심리가 바닥을 만들 수 있습니다.
  - 개인투자자 포럼/소셜미디어 심리가 극단적으로 부정적 → 역지표, 바닥에 근접할 수 있습니다.

  ### 4단계：이동평균 수렴과 변동성
  `analyze_trend`를 사용합니다：
  - MA5/MA10/MA20 세 선이 밀착（이동평균 수렴）→ 에너지 축적 중, 방향 미정, 심리 냉담.
  - 변동성이 낮아짐（ATR 감소）→ 심리 극도로 저조, 에너지 분출 전조.

  ## 심리 바닥 특성（매수 구역）
  다음 3가지 이상 충족：
  ✅ 최근 20일 회전율이 1년 내 저점 수준
  ✅ 거래량 지속 감소, 최근 60일 평균의 50% 이하
  ✅ 최근 뉴스가 주로 저조하거나 중립 또는 부정적
  ✅ 주가가 MA20 근처 또는 그 이하이지만 공황성 급락 없음
  ✅ 기관 지분 안정적이거나 소폭 증가（데이터가 있는 경우）

  ## 심리 정점 특성（감소 구역）
  다음 3가지 이상 충족：
  ⚠️ 최근 5일 회전율 > 최근 20일 평균의 2배
  ⚠️ 거래량 충격성 급증（단일일）
  ⚠️ 뉴스가 주로 호재 실현, 기관 목표가 대폭 상향, 개인투자자 추격 매수
  ⚠️ 주가가 MA5에서 8% 이상 이탈（높은 괴리율）
  ⚠️ MACD 정상 배치 발생

  ## 출력 요구사항
  - 현재 심리 단계 판단：냉담 바닥 / 안정 / 승온 진입 / 과열 경계 / 광기 정점.
  - 현재 회전율과 1년 내 회전율 평균 비교.
  - 심리 바닥 또는 정점 특성 충족 여부（충족 항목 나열）.
  - 역심리 매매 제안 제시（대중이 공황할 때 탐욕스럽게, 대중이 탐욕스러울 때 신중하게）.

  점수 조정 제안：
  - 심리 바닥 특성 3가지 이상 충족：`sentiment_score +14`
  - 심리 바닥 특성 전부 5가지 충족：`sentiment_score +20`
  - 심리 정점 특성 3가지 이상 충족：`sentiment_score -12`
  - 심리 정점 특성 전부 5가지 충족：`sentiment_score -20`
  - 심리 안정 구간：기준 점수 조정 없음
