# Chan Theory Strategy / 찬이론
# Based on Zen channel theory: pen, stroke, segment, hub structure analysis.

name: chan_theory
display_name: 찬이론
description: 찬이론의 필, 선단, 중추 구조를 기반으로 추세 레벨, 매매 시점, 배치 신호를 판단합니다.
category: framework
core_rules: [1, 2, 3, 4]
required_tools:
  - get_daily_history
  - analyze_trend
  - get_realtime_quote

instructions: |
  **찬이론（Chan Theory / Zen Channel Theory）**

  핵심 프레임워크：분형 → 필 → 선단 → 중추 → 추세

  ## 분석 단계

  ### 1. 가격 구조 판단（중추 식별）
  - `get_daily_history`를 사용하여 최근 60일 일봉 데이터를 가져옵니다.
  - 최근 가격의 고저점 시퀀스를 식별하여 현재가
    **횡보 중추**（1개 이상의 중추）인지 **추세 구간**（중추에서 이탈하여 상/하향）인지 판단합니다.
  - 중추：연속 3구간 움직임이 겹치는 구역으로, 가격이 이 구간에서 반복적으로 횡보합니다.
  - 추세：연속 3개의 동일 레벨 중추가 같은 방향으로 이동합니다.

  ### 2. 배치 판단（최우선 신호）
  - **정상 배치**：가격이 신고점을 기록했지만 MACD 빨간 막대 면적이 축소 → 매도/감소 신호.
  - **저점 배치**：가격이 신저점을 기록했지만 MACD 녹색 막대 면적이 축소 → 매수/증가 신호.
  - `analyze_trend`를 사용하여 MACD 데이터를 가져와 가격 고저점과 비교합니다.

  ### 3. 매매 시점 판단
  - **1매수**（최강）：하락 추세 중 마지막 중추에서 저점 배치 발생.
  - **2매수**：하락 중추에서 이탈 후 첫 번째 조정이 중추 고점을 이탈하지 않음.
  - **3매수**：중추 횡보 후 상향 돌파（중추 내로 복귀하지 않음）.
  - **1매도/2매도/3매도**：대칭 구조, 방향 반대.
  - 현재 가격의 매매 시점 레벨이 포지션 크기를 결정합니다.

  ### 4. 레벨과 포지션
  - 일봉 레벨 매매 시점은 비중이 높은 포지션 사용 가능（30~50%）.
  - 주봉 레벨 매매 시점은 더 큰 포지션 사용 가능（50~80%）.
  - 다중 레벨 공명（일봉+주봉 동일 방향）시 신호가 가장 강합니다.

  ### 5. 출력 요구사항
  - 현재 상태를 명확히 설명합니다：상승 추세/하락 추세/중추 횡보.
  - 배치 신호 존재 여부 및 배치 레벨을 지적합니다.
  - 현재 매매 시점 유형（1매수/2매수/3매수 등）을 제시하고, 없으면 "현재 명확한 매매 시점 없음"으로 작성합니다.
  - 손절은 이전 저점（매수 시）또는 이전 고점（매도 시）으로 설정합니다.

  점수 조정 제안：
  - 저점 배치 + 1매수 신호：`sentiment_score +15`
  - 2매수/3매수 공명：`sentiment_score +10`
  - 중추 횡보 명확한 방향 없음：`sentiment_score 기준 유지`
  - 정상 배치 / 추세 하향：`sentiment_score -15`
