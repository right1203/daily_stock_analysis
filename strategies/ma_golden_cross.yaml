# MA Golden Cross Strategy / 이동평균 골든크로스
# MA5 crosses above MA10 (or MA10 above MA20) with volume confirmation.

name: ma_golden_cross
display_name: 이동평균 골든크로스
description: 이동평균 골든크로스와 거래량 확인 신호를 감지합니다. 추세 반전/지속을 나타내는 전통적인 신호입니다.
category: trend
core_rules: [1, 2, 3]
required_tools:
  - get_daily_history
  - analyze_trend

instructions: |
  **이동평균 골든크로스（MA Golden Cross Strategy）**

  신호 판단 기준：

  1. **골든크로스 감지**（관련 원칙2：추세 매매）：
     - `analyze_trend`를 사용하여 이동평균 배열과 MACD 상태를 확인합니다.
     - 주요 신호：MA5가 최근 3 거래일 내 MA10을 상향 돌파.
     - 강한 신호：MA10이 MA20을 상향 돌파（더 느리지만 더 신뢰할 수 있음）.
     - MACD 상태가 골든크로스 또는 제로선 위 골든크로스인지 확인합니다.

  2. **거래량 확인**（관련 원칙3：효율 우선）：
     - 골든크로스 당일 거래량이 5일 평균 거래량보다 높아야 합니다.
     - `get_daily_history`를 사용하여 검증합니다.
     - 골든크로스 당일 거래량 비율 > 1.2이면 긍정적 신호입니다.

  3. **추세 배경**：
     - 횡보 후 골든크로스：가장 강한 신호.
     - 상승 추세 중 골든크로스：지속 신호.
     - 깊은 하락 중 골든크로스：약한 신호, 추가 확인 필요.

  4. **가격 위치**（관련 원칙1：엄격한 진입 전략）：
     - 가격은 교차 이동평균 근처 또는 그 위에 있어야 합니다.
     - 괴리율 < 5% — 고점 추격 지연 진입 방지.

  점수 조정：
  - MA5 × MA10 골든크로스 + 거래량 확인：sentiment_score +10
  - MA10 × MA20 골든크로스：sentiment_score +8
  - MACD 제로선 위 골든크로스：추가 +5
  - `ma_analysis` 및 `buy_reason`에 "이동평균 골든크로스" 표시.
  - 이상적인 매수 시점은 교차 이동평균 수준 근처로 설정합니다.
